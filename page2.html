<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>پیام صوتی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            font-family: 'Vazir', 'IRANSans', 'Tahoma', sans-serif;
            background-color: #000;
            direction: rtl;
            opacity: 0;
            animation: pageFadeIn 1.5s ease-in-out forwards;
        }

        @keyframes pageFadeIn {
            0% {
                opacity: 0;
                transform: translateY(0);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 3px;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 25px;
            padding: 20px 20px 20px 20px;
            width: 98%;
            max-width: 550px;
            height: 99%;
            text-align: center;
            border: 2px solid rgba(255, 215, 0, 0.6);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            gap: 15px;
        }

        .page-title {
            font-size: 2.2em;
            color: #ffffff;
            letter-spacing: 2px;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin-top: -80px;
            margin-bottom: 150px;
        }

        /* متن پیش‌فرض بالا */
        .message-text {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 15px;
            padding: 15px 20px;
            margin-top: -100px;
            margin-bottom: 50px;
            border-right: 3px solid #ffd700;
            text-align: right;
        }

        .message-text p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95em;
            line-height: 1.8;
        }

        /* باکس پیام صوتی */
        .audio-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 20px;
            width: 95%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            margin-top: 0;
            margin-bottom: 15px;
        }

        .wave-animation {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 5px;
            height: 50px;
            flex: 2;
        }

        .wave-animation span {
            width: 5px;
            background: #ffd700;
            border-radius: 3px;
            transition: height 0.1s ease;
        }

        .audio-time {
            color: #ffd700;
            font-size: 0.9em;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 20px;
            min-width: 55px;
            text-align: center;
        }

        .play-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.5em;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            flex-shrink: 0;
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        /* اسلایدر عکس */
        .slider-section {
            width: 100%;
            margin: 10px 0;
        }

        .slider-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .slider-arrow {
            background: transparent;
            border: none;
            font-size: 1.8em;
            color: white;
            cursor: pointer;
            padding: 10px 15px;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .slider-images {
            display: flex;
            gap: 15px;
            justify-content: flex-start;
            align-items: center;
            direction: rtl;
            flex-direction: row-reverse;
        }

        .slider-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid #ffd700;
            opacity: 0.7;
            box-shadow: 0 0 5px #ffd700;
        }

        .slider-img.active {
            opacity: 1;
            border: 3px solid #ff69b4;
            transform: scale(1.05);
        }

        .slider-img:active {
            transform: scale(0.95);
        }

        /* مودال بزرگ‌نمایی */
        .photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .photo-modal.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .close-photo {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* نوار ناوبری */
        .nav-bar {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 20;
            background: transparent;
            padding: 8px 20px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto;
        }

        .nav-arrow {
            background: none;
            border: none;
            font-size: 1.4em;
            color: white;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-arrow:active {
            transform: scale(0.9);
        }

        .page-dots {
            display: flex;
            gap: 10px;
        }

        .dot {
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.5);
        }

        .dot.active {
            color: #00b4ff;
            text-shadow: 0 0 5px #00b4ff;
            transform: scale(1.2);
            display: inline-block;
        }

        .dot:active {
            transform: scale(0.9);
        }

        /* حذف افکت آبی کلیک روی همه دکمه‌ها */
        button,
        .play-btn,
        .slider-arrow,
        .nav-arrow,
        .dot {
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
        }

        img {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .glass-card {
                padding: 15px 12px;
                gap: 12px;
            }

            .page-title {
                font-size: 1.6em;
            }

            .message-text p {
                font-size: 1em;
            }

            .nav-bar {
                bottom: 25px;
                gap: 10px;
                padding: 5px 12px;
            }

            .nav-arrow {
                font-size: 1.2em;
            }

            .dot {
                font-size: 1em;
            }

            .slider-img {
                width: 65px;
                height: 65px;
            }

            .slider-arrow {
                font-size: 1.4em;
                padding: 8px 12px;
            }

            .play-btn {
                width: 45px;
                height: 45px;
                font-size: 1.2em;
            }

            .audio-box {
                padding: 12px 15px;
            }

            .wave-animation span {
                width: 3px;
            }

            .audio-time {
                font-size: 0.7em;
                min-width: 45px;
                padding: 3px 6px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="glass-card">
            <div class="page-title"> پیام صوتی برای ملکه دلها</div>

            <!-- متن پیش‌فرض بالا -->
            <div class="message-text">
                <p>
                    ✨ این یه پیام مخصوص توئه... ✨<br>
                    قبل از اینکه گوش بدی، بدون که هر کلمه‌ش از ته دل نوشته شده.<br>
                    امیدوارم لحظه‌ای که این صدا رو میشنوی، آرامش رو بهت هدیه بده. 🌸<br>
                    امیدوارم همیشه بتونی شاد باشی با وجودت<br>
                    من با وجود تو زندگیم زیبا شده<br>
                    شاد بشی یعنی من شاد شدم
                </p>
            </div>

            <!-- باکس پیام صوتی -->
            <div class="audio-box">
                <div class="wave-animation" id="waveAnimation">
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
                <div class="audio-time" id="audioTime">--:--</div>
                <button class="play-btn" id="playBtn">▶</button>
            </div>

            <!-- اسلایدر عکس -->
            <div class="slider-section">
                <div class="slider-container">
                    <button class="slider-arrow" id="sliderPrev">❮</button>
                    <div class="slider-images" id="sliderImages"></div>
                    <button class="slider-arrow" id="sliderNext">❯</button>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال بزرگ‌نمایی -->
    <div class="photo-modal" id="photoModal">
        <button class="close-photo" id="closePhoto">&times;</button>
        <img class="modal-img" id="modalImg" src="" alt="">
    </div>

    <!-- نوار ناوبری -->
    <div class="nav-bar">
        <button class="nav-arrow" id="prevPage">❮</button>
        <div class="page-dots" id="pageDots">
            <span class="dot" data-page="5">○</span>
            <span class="dot" data-page="4">○</span>
            <span class="dot" data-page="3">○</span>
            <span class="dot active" data-page="2">●</span>
            <span class="dot" data-page="1">○</span>
        </div>
        <button class="nav-arrow" id="nextPage">❯</button>
    </div>

    <script>
        // ========== پیام صوتی ==========
        const audioFile = 'audio/message.mp3';
        const audio = new Audio(audioFile);
        let isPlaying = false;
        let waveInterval = null;

        const playBtn = document.getElementById('playBtn');
        const waveBars = document.querySelectorAll('.wave-animation span');
        const audioTimeDisplay = document.getElementById('audioTime');

        audio.addEventListener('loadedmetadata', () => {
            const minutes = Math.floor(audio.duration / 60);
            const seconds = Math.floor(audio.duration % 60);
            audioTimeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        });

        audio.addEventListener('timeupdate', () => {
            const currentMinutes = Math.floor(audio.currentTime / 60);
            const currentSeconds = Math.floor(audio.currentTime % 60);
            audioTimeDisplay.textContent = `${currentMinutes}:${currentSeconds.toString().padStart(2, '0')}`;
        });

        function startRandomWave() {
            if (waveInterval) clearInterval(waveInterval);
            waveInterval = setInterval(() => {
                if (isPlaying) {
                    waveBars.forEach(bar => {
                        const randomHeight = Math.floor(Math.random() * 40) + 10;
                        bar.style.height = randomHeight + 'px';
                    });
                } else {
                    waveBars.forEach(bar => {
                        bar.style.height = '15px';
                    });
                }
            }, 100);
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '▶';
                isPlaying = false;
            } else {
                audio.play();
                playBtn.innerHTML = '⏸';
                isPlaying = true;
            }
        });

        audio.addEventListener('ended', () => {
            playBtn.innerHTML = '▶';
            isPlaying = false;
        });

        startRandomWave();

        // ========== اسلایدر عکس ==========
        const allPhotos = [
            'photo/11.jpg',
            'photo/7.jpg',
            'photo/13.jpg',
            'photo/14.jpg',
            'photo/15.jpg'
        ];

        let currentStartIndex = 0;
        const visibleCount = 3;
        const sliderImages = document.getElementById('sliderImages');

        function updateSlider() {
            sliderImages.innerHTML = '';
            for (let i = currentStartIndex; i < currentStartIndex + visibleCount && i < allPhotos.length; i++) {
                const img = document.createElement('img');
                img.src = allPhotos[i];
                img.className = 'slider-img';
                img.loading = 'lazy';
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(allPhotos[i]);
                });
                sliderImages.appendChild(img);
            }
        }

        function nextSlide() {
            if (currentStartIndex + visibleCount < allPhotos.length) {
                currentStartIndex++;
                updateSlider();
            }
        }

        function prevSlide() {
            if (currentStartIndex > 0) {
                currentStartIndex--;
                updateSlider();
            }
        }

        document.getElementById('sliderPrev').addEventListener('click', nextSlide);
        document.getElementById('sliderNext').addEventListener('click', prevSlide);

        // مودال
        const modal = document.getElementById('photoModal');
        const modalImg = document.getElementById('modalImg');
        const closeModal = document.getElementById('closePhoto');

        function openModal(src) {
            modalImg.src = src;
            modal.classList.add('show');
        }

        closeModal.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('show');
        });

        updateSlider();

        // ========== نوار ناوبری ==========
        const currentPage = 2;
        const pages = [
            'First-page.html',
            'page2.html',
            'page3.html',
            'page4.html',
            'page5.html',
        ];

        function goToPage(pageNum) {
            if (pageNum >= 1 && pageNum <= pages.length) {
                document.body.style.transition = 'opacity 0.4s';
                document.body.style.opacity = '0';
                setTimeout(() => {
                    window.location.href = pages[pageNum - 1];
                }, 400);
            }
        }

        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage < 6) goToPage(currentPage + 1);
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            if (currentPage > 1) goToPage(currentPage - 1);
        });

        document.querySelectorAll('.dot').forEach(dot => {
            dot.addEventListener('click', () => {
                const pageNum = parseInt(dot.dataset.page);
                if (pageNum !== currentPage) goToPage(pageNum);
            });
        });
    </script>
</body>

</html>
